<div class="actions-component">
  <a class="eav-grid-action-button default-link highlight" matRipple [tippy]="tooltip"  (click)="do('openFields')">
    <mat-icon [matBadge]="value" matBadgePosition="below after" matBadgeColor="accent" matBadgeSize="small"
      [matBadgeHidden]="!value" aria-hidden="false">
      {{icon}}
    </mat-icon>
  </a>
</div>
