<div class="actions-component">
  <div class="eav-grid-action-button highlight" matRipple tippy="Permissions" (click)="do('openPermissions')">
    <mat-icon
      [matBadge]="permissionCount"
      matBadgeColor="accent"
      matBadgeSize="small"
      [matBadgeHidden]="!permissionCount"
      matBadgePosition="below after"
      aria-hidden="false">
      person
    </mat-icon>
  </div>
</div>
