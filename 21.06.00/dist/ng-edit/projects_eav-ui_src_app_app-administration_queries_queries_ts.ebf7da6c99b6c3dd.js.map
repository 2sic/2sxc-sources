<div class="actions-component">
  <div class="eav-grid-action-button highlight" matRipple tippy="Edit" (click)="do(actions.Edit)">
    <mat-icon>edit</mat-icon>
  </div>

  @if (!data._EditInfo.DisableMetadata) {
    <div class="eav-grid-action-button highlight" matRipple tippy="Metadata" (click)="do(actions.Metadata)">
      <mat-icon
        [matBadge]="data.Metadata?.length"
        matBadgeColor="accent"
        matBadgeSize="small"
        [matBadgeHidden]="!data.Metadata?.length"
        matBadgePosition="below after"
        aria-hidden="false"
      >
        local_offer
      </mat-icon>
    </div>
  }
  @if (data._EditInfo.DisableMetadata) {
    <div class="eav-grid-action-button disabled">
      <mat-icon
        [matBadge]="data.Metadata?.length"
        matBadgeColor="accent"
        matBadgeSize="small"
        matBadgeDisabled="true"
        [matBadgeHidden]="!data.Metadata?.length"
        matBadgePosition="below after"
        aria-hidden="false"
      >
        local_offer
      </mat-icon>
    </div>
  }

  @if (!data._EditInfo.DisableEdit && enablePermissions) {
    <div class="eav-grid-action-button highlight" matRipple tippy="Permissions" (click)="do(actions.Permissions)">
      <mat-icon
        [matBadge]="data._Permissions.Count"
        matBadgeColor="accent"
        matBadgeSize="small"
        [matBadgeHidden]="!data._Permissions.Count"
        matBadgePosition="below after"
        aria-hidden="false"
      >
        person
      </mat-icon>
    </div>
  }
  @if (data._EditInfo.DisableEdit || !enablePermissions) {
    <div class="eav-grid-action-button disabled">
      <mat-icon
        [matBadge]="data._Permissions.Count"
        matBadgeColor="accent"
        matBadgeSize="small"
        matBadgeDisabled="true"
        [matBadgeHidden]="!data._Permissions.Count"
        matBadgePosition="below after"
        aria-hidden="false"
      >
        person
      </mat-icon>
    </div>
  }

  <div class="eav-grid-action-button highlight" matRipple tippy="More" [matMenuTriggerFor]="menu">
    <mat-icon>more_horiz</mat-icon>
  </div>
</div>

<mat-menu #menu="matMenu" class="grid-more-menu">
  <ng-template matMenuContent>
    <button mat-menu-item (click)="do(actions.Rest)">
      <mat-icon svgIcon="code-curly"></mat-icon>
      <span>REST API</span>
    </button>
    <button mat-menu-item (click)="do(actions.Clone)">
      <mat-icon>file_copy</mat-icon>
      <span>Copy</span>
    </button>
    <button mat-menu-item (click)="do(actions.Export)">
      <mat-icon>cloud_download</mat-icon>
      <span>Export</span>
    </button>
    <button mat-menu-item [disabled]="data._EditInfo.DisableDelete" (click)="do(actions.Delete)">
      <mat-icon>delete</mat-icon>
      <span>Delete</span>
    </button>
  </ng-template>
</mat-menu>
